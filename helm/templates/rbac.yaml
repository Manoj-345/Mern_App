apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-role
  namespace: default
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: aiops-sa
  namespace: default
roleRef:
  kind: Role
  name: aiops-role
  apiGroup: rbac.authorization.k8s.io